name: newen_traceability
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.1
  sqflite_common_ffi_web: ^0.4.0
  path_provider: ^2.1.5
  mobile_scanner: ^5.2.3
  excel: ^4.0.3
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  http: ^0.13.6

  
  # Latest Firebase Dependencies
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo/newen_logo.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/logo/newen_logo.png"
